<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="Tulja Bhavani Mata">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d"/>
      <stop offset="50%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#450a0a"/>
    </linearGradient>
    <linearGradient id="halo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#glow)"/>
  
  <!-- Decorative border -->
  <rect x="15" y="15" width="370" height="470" fill="none" stroke="#fbbf24" stroke-width="2" rx="8" opacity="0.6"/>
  <rect x="25" y="25" width="350" height="450" fill="none" stroke="#fbbf24" stroke-width="1" rx="6" opacity="0.3"/>
  
  <!-- Halo -->
  <ellipse cx="200" cy="180" rx="100" ry="110" fill="url(#halo)" opacity="0.3"/>
  <ellipse cx="200" cy="180" rx="80" ry="90" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
  
  <!-- Deity silhouette (abstract respectful representation) -->
  <ellipse cx="200" cy="160" rx="45" ry="50" fill="#fef3c7" opacity="0.15"/>
  <path d="M160 200 Q200 140 240 200 L230 320 Q200 340 170 320 Z" fill="#fef3c7" opacity="0.2"/>
  
  <!-- Trident symbol -->
  <g transform="translate(200, 120)" opacity="0.6">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#fbbf24" stroke-width="3"/>
    <line x1="-15" y1="10" x2="-15" y2="40" stroke="#fbbf24" stroke-width="2"/>
    <line x1="15" y1="10" x2="15" y2="40" stroke="#fbbf24" stroke-width="2"/>
  </g>
  
  <!-- Om symbol area -->
  <text x="200" y="380" text-anchor="middle" font-family="serif" font-size="48" fill="#fbbf24" opacity="0.8">P</text>
  
  <!-- Title -->
  <text x="200" y="420" text-anchor="middle" font-family="serif" font-size="18" fill="#fef3c7" font-weight="bold">6M0@ $A3> -5>(@ .>$></text>
  <text x="200" y="450" text-anchor="middle" font-family="serif" font-size="14" fill="#fde68a" opacity="0.8">Tulja Bhavani Mata</text>
  <text x="200" y="475" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fde68a" opacity="0.5">Replace with official image in /public/images/</text>
</svg>
